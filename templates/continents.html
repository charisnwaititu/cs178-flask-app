<!doctype html>
<html lang="en">
  <head>
    <title>Search Continent</title>
  </head>
  <body>
    <h1>Search Continent</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <form action="{{ url_for('continent_form_post') }}" method="post">
      <label for="Continent">Continent:</label><br />
      <input type="text" id="continent" name="continent" required /><br />

      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
