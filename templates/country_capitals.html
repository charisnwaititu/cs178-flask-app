<!DOCTYPE html>
<html lang="en">
<head>
    <title>List of Country Capitals</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h2 class="mt-5">List of Country Capitals</h2>

        <table class="table table-bordered table-striped mt-3">
            <thead class="thead-dark">
                <tr>
                    <th>Country</th>
                    <th>Capital</th>
                </tr>
            </thead>

            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user['Country'] }}</td>
                    <td>{{ user['Capital'] }}</td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>
</body>
</html>
