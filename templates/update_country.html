<!doctype html>
<html lang="en">
  <head>
    <title>Update Favorite Country</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="container mt-4">

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} mt-2">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <h1>Update Favorite Country</h1>

    <form action="{{ url_for('update_country') }}" method="post" class="mt-3">
      <div class="form-group">
        <label for="username">Your Name:</label>
        <input type="text" class="form-control" id="username" name="username" required /><br />
      </div>
      
      <div class="form-group">
        <label for="country">New Country:</label>
        <input type="text" class="form-control" id="country" name="country" required /><br />
      </div>
      
      <input type="submit" value="Update Country" />
    </form>
    <a href="{{ url_for('home') }}">Back to Homepage</a>

  </body>
</html>
