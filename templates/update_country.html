<!doctype html>
<html lang="en">
  <head>
    <title>Update Favorite Country</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <!-- display a flash message here, if necessary -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <h1>Update Favorite Country</h1>
    <form action="{{ url_for('update_country') }}" method="post">
      <label for="username">Your Name:</label><br />
      <input type="text" id="username" name="username" required /><br />
      
      <label for="country">Country:</label><br />
      <input type="text" id="country" name="country" required /><br />
      
      <input type="submit" value="Update Country" />
    </form>
    <a href="{{ url_for('home') }}">Back to Homepage</a>
  </body>
</html>
